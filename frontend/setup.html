<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PocketWise – Setup</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/analytics.css" />
</head>
<body class="setup-page">

  <div class="setup-container">

    <!-- Brand -->
    <div class="setup-logo">
      <div class="setup-logo-icon">
        <svg viewBox="0 0 34 34" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="17" cy="17" r="14" stroke="white" stroke-width="2" stroke-opacity="0.4"/>
          <path d="M11 17h12M17 11v12" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
          <circle cx="17" cy="17" r="4" fill="white" fill-opacity="0.85"/>
        </svg>
      </div>
      <span class="setup-logo-name">PocketWise</span>
    </div>

    <!-- Step indicator -->
    <div class="setup-steps">
      <div class="step-dot active" id="step-dot-1">1</div>
      <div class="step-line"></div>
      <div class="step-dot" id="step-dot-3">2</div>
    </div>

    <!-- Alert -->
    <div class="auth-alert hidden" id="setup-alert"></div>

    <!-- Step 1: Income -->
    <div id="step-1">
      <div class="card" style="max-width:520px;margin:0 auto;">
        <h2 style="font-family:var(--font-display);font-size:1.5rem;font-weight:800;margin-bottom:8px;">What is your monthly income?</h2>
        <p class="text-muted" style="margin-bottom:24px;">This helps us suggest how to allocate your budget across categories.</p>

        <div class="form-group">
          <label class="form-label" for="monthly-income">Monthly Income (₹)</label>
          <div class="input-wrapper">
            <span class="input-prefix">₹</span>
            <input type="number" id="monthly-income" class="form-input" placeholder="e.g. 50000" min="1" required />
          </div>
          <span class="field-error" id="income-err"></span>
        </div>

        <button class="btn btn-primary btn-full" id="complete-setup-btn" onclick="completeSetup()" style="margin-top:8px;">
          Complete Setup & Go to Dashboard →
        </button>
      </div>
    </div>

    <!-- Step 3: Done -->
    <div class="hidden" id="step-3">
      <div class="card text-center" style="max-width:480px;margin:0 auto;padding:48px 32px;">
        <div class="setup-done-icon">🎉</div>
        <h2 style="font-family:var(--font-display);font-size:1.8rem;font-weight:800;margin-bottom:12px;">You're all set!</h2>
        <p class="text-muted">Your financial profile is ready. Redirecting to your dashboard...</p>
        <div class="redirect-bar-track">
          <div id="redirect-bar"></div>
        </div>
      </div>
    </div>

  </div>

  <script src="js/api.js"></script>
  <script src="js/setup.js"></script>
</body>
</html>
